name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Railway backend URL into all HTML files
        run: |
          RAILWAY_URL="${{ secrets.RAILWAY_URL }}"
          if [ -z "$RAILWAY_URL" ]; then
            echo "❌ ERROR: RAILWAY_URL secret is not set!"
            echo "Go to repo Settings → Secrets → New secret → RAILWAY_URL"
            exit 1
          fi
          echo "✅ Injecting backend URL: $RAILWAY_URL"
          sed -i "s|http://localhost:3000|$RAILWAY_URL|g" volta_mobile.html
          sed -i "s|http://localhost:3000|$RAILWAY_URL|g" volta_admin.html
          sed -i "s|http://localhost:3000|$RAILWAY_URL|g" volta_login.html
          echo "✅ URL injection complete"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
